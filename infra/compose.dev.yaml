# ローカル検証用のCompose
# CIでは利用しない

services:
  db:
    image: postgres:17
    container_name: study-db
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${DB_ADMIN_USER}
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      DB_MIGRATION_USER: ${DB_MIGRATION_USER}
      DB_MIGRATION_PASSWORD: ${DB_MIGRATION_PASSWORD}
      DB_APP_USER: ${DB_APP_USER}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
  firebase-emulator:
    image: node:22-bookworm
    working_dir: /workspace
    command: >
      sh -c "
        npm install -g firebase-tools &&
        firebase emulators:start --only auth --project study-local
      "
    ports:
      - "9099:9099"
      - "4000:4000"
    volumes:
      - ./firebase/firebase.json:/workspace/firebase.json

volumes:
  postgres_data:
